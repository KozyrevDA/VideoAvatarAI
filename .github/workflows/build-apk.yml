name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle & Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --stacktrace \
            --no-daemon \
            -Pkotlin.incremental=false
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.keystore
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore decoded"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  No keystore — skipping release"
          fi

      - name: Build Release APK
        if: steps.keystore.outputs.exists == 'true'
        run: |
          ./gradlew :composeApp:assembleRelease \
            --stacktrace \
            --no-daemon \
            -Pkotlin.incremental=false
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find composeApp/build/outputs/apk -name "*.apk" | while read f; do
            TYPE=$(echo "$f" | grep -oE 'debug|release')
            cp "$f" "artifacts/НейросетьВидео-${TYPE}.apk"
            echo "📦 artifacts/НейросетьВидео-${TYPE}.apk — $(du -h "$f" | cut -f1)"
          done

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-debug
          path: artifacts/НейросетьВидео-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: steps.keystore.outputs.exists == 'true'
        with:
          name: НейросетьВидео-release
          path: artifacts/НейросетьВидео-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Результат сборки" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls artifacts/*.apk 2>/dev/null; then
            echo "| APK | Размер |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
            ls -lh artifacts/*.apk | awk '{print "| " $NF " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Скачать:** Artifacts внизу этой страницы ↓" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не собрался — смотри логи выше" >> $GITHUB_STEP_SUMMARY
          fi
