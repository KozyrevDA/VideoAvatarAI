name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: List APK output
        run: |
          echo "Содержимое composeApp/build/outputs/apk/:"
          find composeApp/build/outputs/apk -type f 2>/dev/null || echo "Директория не найдена"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Нейросеть Видео — APK" >> $GITHUB_STEP_SUMMARY
          APK=$(find composeApp/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(du -h "$APK" | cut -f1)
            echo "✅ **$SIZE** — $(basename $APK)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ Скачать → **Artifacts** внизу страницы" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не создан" >> $GITHUB_STEP_SUMMARY
          fi
