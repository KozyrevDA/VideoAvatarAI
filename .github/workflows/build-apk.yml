name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup environment
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      # ── Debug APK ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon -Pkotlin.incremental=false
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # ── Release APK (опционально) ──────────────────────────────────────────
      - name: Decode keystore
        id: ks
        continue-on-error: true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          [ -z "$KEYSTORE_BASE64" ] && exit 0
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.keystore
          echo "path=$GITHUB_WORKSPACE/keystore/release.keystore" >> $GITHUB_OUTPUT
          echo "ok=true" >> $GITHUB_OUTPUT

      - name: Build Release APK
        if: steps.ks.outputs.ok == 'true'
        continue-on-error: true
        run: ./gradlew :composeApp:assembleRelease --stacktrace --no-daemon -Pkotlin.incremental=false
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ steps.ks.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: steps.ks.outputs.ok == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## 📱 APK Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Размер |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          find composeApp/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "| $(basename $f) | $(du -h "$f" | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ **Скачать:** Artifacts ↓ внизу страницы" >> $GITHUB_STEP_SUMMARY
