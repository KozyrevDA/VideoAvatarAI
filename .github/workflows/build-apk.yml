name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK anywhere in workspace
        run: |
          echo "=== Все .apk во всём workspace ==="
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || echo "Нет .apk нигде"
          echo ""
          echo "=== Дерево composeApp/build/outputs ==="
          ls -la composeApp/build/outputs/ 2>/dev/null || echo "composeApp/build/outputs не существует"
          echo ""
          echo "=== Gradle tasks для composeApp ==="
          ./gradlew :composeApp:tasks --all --no-daemon 2>/dev/null | grep -i "apk\|assemble\|bundle" | head -20

      - name: Copy APK
        run: |
          APK=$(find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK не найден нигде!"
            exit 1
          fi
          echo "✅ APK: $APK — $(du -h "$APK" | cut -f1)"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Нейросеть Видео — Debug APK" >> $GITHUB_STEP_SUMMARY
          if [ -f NeurosetVideo-debug.apk ]; then
            echo "✅ $(du -h NeurosetVideo-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ Artifacts ↓ внизу страницы" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не найден" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Пусто" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
