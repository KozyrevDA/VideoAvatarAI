name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: List available assemble tasks
        run: |
          ./gradlew :composeApp:tasks --all --no-daemon 2>&1 \
            | grep -iE "assemble|package|apk|bundle" \
            | tee /tmp/tasks.txt
          echo "---"
          cat /tmp/tasks.txt

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build.log
          echo "EXIT=${PIPESTATUS[0]}"

      - name: Diagnose build output
        run: |
          {
            echo "=== EXIT CODE ==="
            cat /tmp/build.log | grep -E "BUILD|FAIL|SUCCESS" | tail -5
            echo ""
            echo "=== composeApp/build tree ==="
            find composeApp/build -type f 2>/dev/null | head -50 || echo "пусто"
            echo ""
            echo "=== All APK files ==="
            find / -name "*.apk" 2>/dev/null | grep -v proc | head -20 || echo "нет"
            echo ""
            echo "=== Gradle outputs dir ==="
            ls -la composeApp/build/outputs/ 2>/dev/null || echo "не существует"
          } | tee /tmp/diag.txt
          cat /tmp/diag.txt

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostic
          path: |
            /tmp/build.log
            /tmp/diag.txt
            /tmp/tasks.txt
          retention-days: 7

      - name: Copy and upload APK
        run: |
          APK=$(find / -name "*.apk" 2>/dev/null | grep -v proc | head -1)
          if [ -z "$APK" ]; then
            echo "APK не найден вообще нигде!"
            exit 1
          fi
          echo "APK: $APK"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30
