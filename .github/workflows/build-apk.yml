name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK (no cache, verbose)
        run: |
          # Полный вывод в файл
          ./gradlew :composeApp:assembleDebug \
            --no-daemon --info --stacktrace \
            --no-build-cache \
            -Dorg.gradle.caching=false \
            2>&1 | tee /tmp/build_full.log

          echo ""
          echo "=== LAST 100 LINES ==="
          tail -100 /tmp/build_full.log

          echo ""
          echo "=== APK SEARCH ==="
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null \
            | grep -v "build-tools" | grep -v "platforms" | grep -v "emulator"
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK + build log
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            composeApp/build/outputs/apk/debug/*.apk
            /tmp/build_full.log
          if-no-files-found: warn
          retention-days: 7
