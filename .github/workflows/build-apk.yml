name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug --info --no-daemon 2>&1 \
            | grep -E "APK|apk|Task.*:composeApp|OUTPUT|Packing|Wrote|BUILD|FAIL" \
            | tee /tmp/build-key.log
          echo ""
          echo "--- Full task output ---"
          cat /tmp/build-key.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK in project only
        id: apk_path
        run: |
          echo "=== APK в нашем проекте ==="
          find "$GITHUB_WORKSPACE" -name "*.apk" \
            ! -path "*/.gradle/*" \
            ! -path "*/sdk/*" \
            ! -path "*/android-sdk/*" \
            2>/dev/null | tee /tmp/apk-list.txt

          echo "=== Дерево outputs ==="
          find "$GITHUB_WORKSPACE/composeApp/build" -type f 2>/dev/null \
            | grep -v ".gradle\|kotlin\|classes\|java\|ksp\|generated" \
            | head -30 | tee -a /tmp/apk-list.txt

          # Выбираем первый правильный APK
          APK=$(cat /tmp/apk-list.txt | grep "\.apk$" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "Выбранный APK: '$APK'"

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic
          path: |
            /tmp/build-key.log
            /tmp/apk-list.txt
          retention-days: 7

      - name: Copy APK
        run: |
          APK="${{ steps.apk_path.outputs.apk }}"
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "❌ Наш APK не найден в workspace!"
            echo "Полный список .apk на сервере:"
            find / -name "*.apk" 2>/dev/null | grep -v proc | head -30
            exit 1
          fi
          SIZE=$(du -h "$APK" | cut -f1)
          echo "✅ APK: $APK ($SIZE)"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Нейросеть Видео — Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -f NeurosetVideo-debug.apk ]; then
            SIZE=$(du -h NeurosetVideo-debug.apk | cut -f1)
            echo "✅ **NeurosetVideo-debug.apk** — $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ Artifacts ↓ внизу страницы" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не найден" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**APK поиск:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/apk-list.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
