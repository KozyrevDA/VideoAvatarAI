name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --stacktrace --no-daemon 2>&1 > build-output.log
          echo "Exit: $?"
          echo "Log size: $(wc -c < build-output.log) bytes"
          tail -30 build-output.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Diagnose
        run: |
          echo "=== APK files ==="
          find composeApp/build -name "*.apk" 2>/dev/null || echo "none"
          echo "=== AAR files ==="
          find composeApp/build -name "*.aar" 2>/dev/null || echo "none"
          echo "=== Build outputs ==="
          find composeApp/build/outputs -type f 2>/dev/null | head -30 || echo "empty"
          echo "=== Log tail ==="
          tail -50 build-output.log

      - name: Commit diagnostic
        run: |
          git config user.email "bot@nla.org"
          git config user.name "CI Bot"
          git add build-output.log
          git diff --cached --quiet || git commit -m "ci: build diagnostic [skip ci]"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
        continue-on-error: true

      - name: Copy and upload APK
        run: |
          APK=$(find composeApp/build -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK не найден!"
            exit 1
          fi
          cp "$APK" NeurosetVideo-debug.apk
          echo "✅ $(du -h NeurosetVideo-debug.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30
