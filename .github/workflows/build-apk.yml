name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # ручной запуск из UI GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Код ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ──────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle cache ─────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 5. Права на gradlew ──────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 6. Debug APK ────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 7. Keystore из GitHub Secret ────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.keystore
            echo "Keystore decoded ✅"
          else
            echo "No keystore secret — skipping release build"
          fi

      # ── 8. Release APK (только если есть keystore) ──────────────────────────
      - name: Build Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: ./gradlew :composeApp:assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── 9. Переименовываем APK ───────────────────────────────────────────────
      - name: Rename APKs
        run: |
          mkdir -p artifacts
          # Debug
          find composeApp/build/outputs/apk/debug -name "*.apk" | while read f; do
            cp "$f" "artifacts/НейросетьВидео-debug.apk"
          done
          # Release (если собран)
          find composeApp/build/outputs/apk/release -name "*.apk" 2>/dev/null | while read f; do
            cp "$f" "artifacts/НейросетьВидео-release.apk"
          done
          ls -lh artifacts/

      # ── 10. Загружаем артефакты ──────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-debug
          path: artifacts/НейросетьВидео-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        with:
          name: НейросетьВидео-release
          path: artifacts/НейросетьВидео-release.apk
          retention-days: 30

      # ── 11. Уведомление в summary ────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ APK собран" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Файл | Размер |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          ls -lh artifacts/*.apk | awk '{print "| " $NF " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Скачать:** Actions → этот запуск → Artifacts внизу страницы" >> $GITHUB_STEP_SUMMARY
