name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup environment
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --stacktrace --no-daemon \
            -Pkotlin.incremental=false \
            2>&1 | tee build-debug.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-debug.log
          retention-days: 7

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.keystore
            # Проверяем
            keytool -list -keystore keystore/release.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 | head -5
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=$GITHUB_WORKSPACE/keystore/release.keystore" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        if: steps.keystore.outputs.exists == 'true'
        run: |
          ./gradlew :composeApp:assembleRelease \
            --stacktrace --no-daemon \
            -Pkotlin.incremental=false
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          # Абсолютный путь к keystore
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find composeApp/build/outputs/apk -name "*.apk" | while read f; do
            TYPE=$(echo "$f" | grep -oE 'debug|release')
            DEST="artifacts/НейросетьВидео-${TYPE}.apk"
            cp "$f" "$DEST"
            SIZE=$(du -h "$DEST" | cut -f1)
            echo "✅ $DEST ($SIZE)"
          done

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-debug
          path: artifacts/НейросетьВидео-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: steps.keystore.outputs.exists == 'true'
        with:
          name: НейросетьВидео-release
          path: artifacts/НейросетьВидео-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Сборка APK — Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls artifacts/*.apk 2>/dev/null | grep -q apk; then
            echo "| Файл | Размер |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            for f in artifacts/*.apk; do
              echo "| $(basename $f) | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ **Скачать APK:** прокрути вниз до раздела **Artifacts**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не собрался" >> $GITHUB_STEP_SUMMARY
          fi
