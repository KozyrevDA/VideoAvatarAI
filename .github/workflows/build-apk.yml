name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-kmp-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-kmp-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      # Проверяем что assembleDebug вообще существует
      - name: Check tasks
        run: |
          ./gradlew :composeApp:tasks --all --no-daemon 2>&1 | grep -i "assemble\|debug\|apk" | head -20
          echo "---tasks check done---"
        continue-on-error: true

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --no-daemon \
            --stacktrace \
            --no-build-cache \
            --rerun-tasks \
            -Dorg.gradle.configuration-cache=false
          echo "=== All APKs ==="
          find . -name "*.apk" 2>/dev/null | tee /tmp/apks.txt
          cat /tmp/apks.txt | wc -l
          if [ ! -s /tmp/apks.txt ]; then
            echo "ERROR: No APK produced!"
            echo "=== Build outputs ==="
            find composeApp/build -type f 2>/dev/null | grep -v "\.class\|\.kotlin" | head -30
            exit 1
          fi
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: |
            composeApp/build/outputs/apk/**/*.apk
            composeApp/build/**/*.apk
          if-no-files-found: error
          retention-days: 30
