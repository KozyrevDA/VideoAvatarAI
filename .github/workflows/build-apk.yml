name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Locate and rename APK
        run: |
          APK=$(find composeApp/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK path: $APK"
          echo "APK size: $(du -h "$APK" | cut -f1)"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.keystore
          ./gradlew :composeApp:assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## APK Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          find composeApp/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "- $(basename $f): $(du -h $f | cut -f1)" >> $GITHUB_STEP_SUMMARY
          done
