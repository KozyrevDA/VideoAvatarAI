name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-kmp-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-kmp-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Diagnostics + Build
        run: |
          S=$GITHUB_STEP_SUMMARY

          # Пишем промежуточные результаты прямо в Summary
          echo "## Build Diagnostics" >> $S

          echo "### Tasks" >> $S
          echo '```' >> $S
          ./gradlew :composeApp:tasks --no-daemon 2>&1 | grep -E "assemble|install|bundle|package" | head -20 >> $S
          echo '```' >> $S

          echo "### Gradle build" >> $S
          echo '```' >> $S
          ./gradlew :composeApp:assembleDebug \
            --no-daemon --stacktrace --no-build-cache --rerun-tasks \
            -Dorg.gradle.configuration-cache=false 2>&1 | tail -60 >> $S
          GRADLE_RC=$?
          echo '```' >> $S
          echo "**Gradle exit code: $GRADLE_RC**" >> $S

          echo "### APK search" >> $S
          echo '```' >> $S
          find . -name "*.apk" 2>/dev/null >> $S || echo "none" >> $S
          echo '```' >> $S

          echo "### Build outputs" >> $S
          echo '```' >> $S
          find composeApp/build/outputs -type f 2>/dev/null | head -20 >> $S || echo "no outputs dir" >> $S
          echo '```' >> $S

          exit $GRADLE_RC
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
