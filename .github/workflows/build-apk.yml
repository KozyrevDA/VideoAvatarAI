name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --stacktrace --no-daemon 2>&1 > build-output.log
          echo "Exit: $?"
          echo "Log size: $(wc -c < build-output.log) bytes"
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Diagnose and find APK
        run: |
          {
            echo "=== BUILD LOG (last 100 lines) ==="
            tail -100 build-output.log
            echo ""
            echo "=== composeApp/build directory ==="
            find composeApp/build -type f 2>/dev/null | sort | head -50
            echo ""
            echo "=== APK search ==="
            find composeApp/build -name "*.apk" 2>/dev/null
            find composeApp/build -name "*.aar" 2>/dev/null
          } > build-diag.txt
          cat build-diag.txt

      - name: Push diagnostic to repo
        run: |
          git config user.email "bot@nla.org"
          git config user.name "CI Bot"
          git add build-output.log build-diag.txt
          git commit -m "CI: build diagnostic [skip ci]" --allow-empty
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy APK
        run: |
          APK=$(find composeApp/build -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK не найден"
            cat build-diag.txt
            exit 1
          fi
          cp "$APK" NeurosetVideo-debug.apk
          echo "✅ $(du -h NeurosetVideo-debug.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30
