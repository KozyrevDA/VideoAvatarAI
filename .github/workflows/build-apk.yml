name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          git config user.email "ci@github.com"
          git config user.name "CI Bot"

      - name: Build Debug APK
        id: build
        run: |
          set +e
          ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace --no-build-cache 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$BUILD_EXIT" >> $GITHUB_OUTPUT
          mkdir -p build-output
          {
            echo "EXIT: $BUILD_EXIT"
            echo "=== WHAT WENT WRONG ==="
            grep -A 20 "What went wrong" /tmp/build.log || echo "(not found)"
            echo "=== TASK FAILURES ==="
            grep -E "FAILED|Exception|error:|Error:" /tmp/build.log | grep -v "Cache entries" || echo "(none)"
            echo "=== LAST 200 LINES ==="
            tail -200 /tmp/build.log
            echo "=== APKs ==="
            find . -name "*.apk" 2>/dev/null | grep -v build-tools | grep -v platforms | grep -v emulator || echo "(none)"
          } > build-output/last-log.txt
          git add build-output/
          git commit -m "ci: log $BUILD_EXIT" --allow-empty || true
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main || true
          exit $BUILD_EXIT
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.keystore
          ./gradlew :composeApp:assembleRelease --no-daemon --no-build-cache
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
