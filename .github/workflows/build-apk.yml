name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      # Сначала только резолюция зависимостей — быстро покажет ошибку если есть
      - name: Resolve dependencies
        id: deps
        run: |
          ./gradlew :composeApp:dependencies --no-daemon 2>&1 | tail -50 > deps.log || true
          cat deps.log

      - name: Build Debug APK
        id: debug
        run: |
          set +e
          ./gradlew :composeApp:assembleDebug \
            --stacktrace --no-daemon 2>&1 | tee build.log
          echo "rc=$?" >> $GITHUB_OUTPUT
          # Показываем последние 80 строк в Summary
          echo "## Build log (last 80 lines)" >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            deps.log
          retention-days: 7

      - name: Fail if debug failed
        if: steps.debug.outputs.rc != '0'
        run: exit 1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Decode keystore + Release APK
        continue-on-error: true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          [ -z "$KEYSTORE_BASE64" ] && exit 0
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.keystore
          ./gradlew :composeApp:assembleRelease --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-release
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
