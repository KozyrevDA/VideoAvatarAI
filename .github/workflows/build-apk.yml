name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          set +e
          OUTPUT=$(./gradlew :composeApp:assembleDebug --stacktrace --no-daemon 2>&1)
          RC=$?
          echo "$OUTPUT" > /tmp/build.log

          # Пишем последние 200 строк в Step Summary (видно через API и в UI)
          echo "## Gradle Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Выходим с оригинальным кодом
          exit $RC
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
