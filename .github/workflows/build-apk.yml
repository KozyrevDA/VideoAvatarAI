name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-kmp-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-kmp-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon
          echo "=== Gradle exit: $? ==="
          echo "=== APK search ==="
          find . -name "*.apk" 2>/dev/null && echo "Found APKs above" || echo "NO APKs found anywhere!"
          echo "=== composeApp/build/outputs ==="
          find composeApp/build/outputs -type f 2>/dev/null | head -30 || echo "No outputs dir"
          echo "=== Recent files (last 2 min) ==="
          find composeApp/build -newer local.properties -type f 2>/dev/null | grep -v "\.class$" | head -20 || echo "No recent build files"
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: |
            **/*.apk
          if-no-files-found: error
          retention-days: 30
