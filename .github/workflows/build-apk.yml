name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup environment
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Check dependencies
        run: ./gradlew :composeApp:dependencies --configuration releaseRuntimeClasspath --no-daemon 2>&1 | tail -30 || true

      - name: Build Debug APK
        id: build_debug
        run: |
          ./gradlew :composeApp:assembleDebug \
            --stacktrace \
            --no-daemon \
            --info \
            -Pkotlin.incremental=false \
            2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.keystore
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        if: steps.keystore.outputs.exists == 'true'
        run: |
          ./gradlew :composeApp:assembleRelease --stacktrace --no-daemon
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find composeApp/build/outputs/apk -name "*.apk" | while read f; do
            TYPE=$(echo "$f" | grep -oE 'debug|release')
            cp "$f" "artifacts/НейросетьВидео-${TYPE}.apk"
            echo "📦 $(du -h "artifacts/НейросетьВидео-${TYPE}.apk")"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: НейросетьВидео-debug
          path: artifacts/НейросетьВидео-debug.apk
          if-no-files-found: error
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: steps.keystore.outputs.exists == 'true'
        with:
          name: НейросетьВидео-release
          path: artifacts/НейросетьВидео-release.apk
          if-no-files-found: warn
          retention-days: 30
