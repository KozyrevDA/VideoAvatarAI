name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK
        id: find_apk
        run: |
          echo "=== composeApp/build/outputs ==="
          find composeApp/build/outputs -type f 2>/dev/null | sort

          echo ""
          echo "=== All APKs in workspace ==="
          find $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null | grep -v "\./root" | grep -v "/proc" | grep -v "/sys"

          # Ищем APK из нашего проекта (исключаем системные)
          APK=$(find $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null \
            | grep -v "/proc" | grep -v "/sys" \
            | grep -v "build-tools" | grep -v "platforms/" \
            | sort -k5 -t/ -r | head -1)

          if [ -z "$APK" ]; then
            echo "❌ APK не найден"
            exit 1
          fi

          SIZE=$(du -h "$APK" | cut -f1)
          echo ""
          echo "✅ Выбран: $APK ($SIZE)"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_size=$SIZE" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## APK Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          echo "Path: ${{ steps.find_apk.outputs.apk_path }}" >> $GITHUB_STEP_SUMMARY
          echo "Size: ${{ steps.find_apk.outputs.apk_size }}" >> $GITHUB_STEP_SUMMARY
          echo "Скачать: Artifacts ↓" >> $GITHUB_STEP_SUMMARY
