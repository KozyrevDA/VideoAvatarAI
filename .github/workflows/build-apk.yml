name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-kmp-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-kmp-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Locate APK
        run: |
          echo "=== All APKs in workspace ==="
          find "$GITHUB_WORKSPACE" -name "*.apk" 2>/dev/null || echo "No APKs found!"
          echo ""
          echo "=== composeApp/build structure ==="
          ls -la "$GITHUB_WORKSPACE/composeApp/build/" 2>/dev/null || echo "No build dir!"
          find "$GITHUB_WORKSPACE/composeApp/build" -type d 2>/dev/null | head -20

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: |
            composeApp/build/outputs/apk/**/*.apk
            composeApp/build/**/*.apk
          if-no-files-found: error
          retention-days: 30
