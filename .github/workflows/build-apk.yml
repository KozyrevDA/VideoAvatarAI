name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Без кэша Gradle — чисто, без UP-TO-DATE
      - name: Build Debug APK (no cache)
        run: |
          ./gradlew :composeApp:assembleDebug \
            --no-daemon \
            --no-build-cache \
            --rerun-tasks \
            --stacktrace 2>&1 | tail -50
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Show build output
        run: |
          echo "=== composeApp/build/outputs ==="
          find composeApp/build/outputs -type f 2>/dev/null || echo "ПУСТО"
          echo ""
          echo "=== Все APK в workspace ==="
          find "$GITHUB_WORKSPACE" -name "*.apk" \
            ! -path "*sdk*" ! -path "*/.gradle/*" 2>/dev/null || echo "ПУСТО"

      - name: Upload APK
        run: |
          APK=$(find "$GITHUB_WORKSPACE" -name "*.apk" \
            ! -path "*sdk*" ! -path "*/.gradle/*" 2>/dev/null | head -1)

          if [ -z "$APK" ]; then
            echo "❌ APK не найден в workspace"
            echo "Содержимое composeApp/build:"
            find composeApp/build -type f 2>/dev/null | head -30
            exit 1
          fi

          SIZE=$(du -h "$APK" | cut -f1)
          echo "✅ APK: $APK ($SIZE)"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          if [ -f NeurosetVideo-debug.apk ]; then
            echo "✅ **$(du -h NeurosetVideo-debug.apk | cut -f1)**  NeurosetVideo-debug.apk" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ **Artifacts** внизу страницы" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не создан" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            find composeApp/build -type f 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
