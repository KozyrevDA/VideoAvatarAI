name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-kmp-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-kmp-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build
        run: |
          # Запускаем сборку, захватываем вывод
          ./gradlew :composeApp:assembleDebug \
            --no-daemon --stacktrace --no-build-cache --rerun-tasks \
            -Dorg.gradle.configuration-cache=false \
            2>&1 | tee /tmp/build.log
          GRADLE_RC=${PIPESTATUS[0]}

          # Пишем критичные строки через ::notice:: — попадут в аннотации API
          echo "::notice title=Gradle Exit Code::$GRADLE_RC"

          APKS=$(find . -name "*.apk" 2>/dev/null | tr '\n' ' ')
          echo "::notice title=APK Files::${APKS:-NONE FOUND}"

          OUTPUTS=$(find composeApp/build/outputs -type f 2>/dev/null | head -10 | tr '\n' '|')
          echo "::notice title=Build Outputs::${OUTPUTS:-no outputs dir}"

          # Последние 30 строк лога
          TAIL=$(tail -30 /tmp/build.log | tr '\n' '~')
          echo "::notice title=Build Log Tail::$TAIL"

          exit $GRADLE_RC
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
