name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Environment check
        run: |
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "gradlew exists: $(ls -la gradlew)"
          echo "gradlew executable: $(file gradlew)"
          echo "SDK build-tools: $(ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null | head -3)"
          echo "local.properties:"
          cat local.properties 2>/dev/null || echo "MISSING"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Test Gradle version
        run: |
          echo "=== Gradle version test ==="
          ./gradlew --version --no-daemon 2>&1
          echo "Gradle version exit: $?"

      - name: Check module config
        run: |
          echo "=== settings.gradle.kts ==="
          cat settings.gradle.kts
          echo ""
          echo "=== composeApp/build.gradle.kts (first 30 lines) ==="
          head -30 composeApp/build.gradle.kts

      - name: Build Debug APK
        run: |
          echo "=== Starting Gradle build ==="
          set -x
          ./gradlew :composeApp:assembleDebug \
            --stacktrace --no-daemon \
            2>&1 | tee /tmp/gradle.log
          echo "=== Gradle finished, exit=${PIPESTATUS[0]} ==="
          echo "Log size: $(wc -l < /tmp/gradle.log) lines"
          echo ""
          echo "=== Last 50 lines ==="
          tail -50 /tmp/gradle.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK
        run: |
          echo "=== All files in composeApp/build/outputs ==="
          find composeApp/build/outputs -type f 2>/dev/null | sort || echo "EMPTY"
          echo ""
          echo "=== APK files ==="
          find composeApp/build -name "*.apk" 2>/dev/null | sort || echo "NONE"
          echo ""
          echo "=== composeApp/build/outputs tree ==="
          ls -laR composeApp/build/outputs/apk/ 2>/dev/null || echo "NO APK DIR"
          
          APK=$(find composeApp/build -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ APK found: $APK"
            cp "$APK" NeurosetVideo-debug.apk
          else
            echo "❌ No APK"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log
          retention-days: 7
