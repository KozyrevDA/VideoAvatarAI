name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --info --no-daemon --no-build-cache --rerun-tasks \
            2>&1 | tee /tmp/full.log
          echo ""
          echo "=== APK lines in log ==="
          grep -iE "\.apk|packaging apk|wrote|BUILD SUCCESS|BUILD FAILED" /tmp/full.log | head -20
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK from log or filesystem
        run: |
          # Приоритет 1: путь из Gradle лога
          APK=$(grep -oE '[^ "]+\.apk' /tmp/full.log 2>/dev/null | grep -v "proto\|unsigned" | head -1)

          # Приоритет 2: поиск в проекте
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            APK=$(find "$GITHUB_WORKSPACE/composeApp" -name "*.apk" \
              ! -name "*unsigned*" 2>/dev/null | head -1)
          fi

          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "❌ APK НЕ НАЙДЕН"
            echo "--- build/outputs structure ---"
            find "$GITHUB_WORKSPACE/composeApp/build" -type d 2>/dev/null | head -20
            echo "--- last 50 lines of build log ---"
            tail -50 /tmp/full.log
            exit 1
          fi

          echo "✅ APK: $APK"
          echo "   Size: $(du -h "$APK" | cut -f1)"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/full.log
          retention-days: 3

      - name: Summary
        if: always()
        run: |
          echo "## Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          if [ -f NeurosetVideo-debug.apk ]; then
            echo "✅ **NeurosetVideo-debug.apk** — $(du -h NeurosetVideo-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ **Artifacts** ↓ внизу страницы" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не создан" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 /tmp/full.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "no log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
