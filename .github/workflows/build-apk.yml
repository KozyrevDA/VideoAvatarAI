name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK (search entire filesystem like Run#25)
        run: |
          echo "=== Ищем APK по всей ФС ==="
          ALL=$(find / -name "*.apk" 2>/dev/null | grep -v proc)
          echo "$ALL"

          echo ""
          echo "=== composeApp/build tree ==="
          find composeApp/build -type f 2>/dev/null | sort | head -50 || echo "пусто"

          # Копируем первый найденный APK
          APK=$(echo "$ALL" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK не найден нигде"
            exit 1
          fi
          SIZE=$(du -h "$APK" | cut -f1)
          echo ""
          echo "✅ APK: $APK ($SIZE)"
          cp "$APK" NeurosetVideo-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: NeurosetVideo-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## 📱 Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          if [ -f NeurosetVideo-debug.apk ]; then
            echo "✅ $(du -h NeurosetVideo-debug.apk | cut -f1) — NeurosetVideo-debug.apk" >> $GITHUB_STEP_SUMMARY
            echo "⬇️ Artifacts ↓" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не создан" >> $GITHUB_STEP_SUMMARY
          fi
