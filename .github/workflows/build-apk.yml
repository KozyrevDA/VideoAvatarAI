name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle deps only (NOT build outputs)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-deps-${{ hashFiles('**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-deps-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --no-daemon --stacktrace --rerun-tasks \
            -Dorg.gradle.caching=false
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Show build outputs
        run: |
          echo "=== composeApp/build/outputs ==="
          find composeApp/build/outputs -type f 2>/dev/null | sort || echo "(пусто)"
          echo ""
          echo "=== All APKs in project ==="
          find . -name "*.apk" -not -path "*/build-tools/*" -not -path "*/platforms/*" 2>/dev/null

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## APK Нейросеть Видео" >> $GITHUB_STEP_SUMMARY
          APK=$(find composeApp/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ $(du -h $APK | cut -f1) — $(basename $APK)" >> $GITHUB_STEP_SUMMARY
            echo "Скачать: Artifacts ↓" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APK не создан" >> $GITHUB_STEP_SUMMARY
          fi
