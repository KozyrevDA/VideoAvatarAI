name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: gradle-kmp-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-kmp-

      - name: Setup
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          cat local.properties

      # Шаг 1: Просто проверить что Gradle стартует
      - name: Gradle version check
        run: ./gradlew --version 2>&1

      # Шаг 2: Посмотреть задачи без сборки
      - name: List tasks
        run: ./gradlew :composeApp:tasks --no-daemon 2>&1 | head -50
        continue-on-error: true

      # Шаг 3: Попробовать только конфигурацию (без компиляции)
      - name: Configuration check
        run: ./gradlew :composeApp:dependencies --configuration debugRuntimeClasspath --no-daemon 2>&1 | tail -80
        continue-on-error: true
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # Шаг 4: Реальная сборка с выводом в файл-артефакт
      - name: Build Debug APK
        run: |
          ./gradlew :composeApp:assembleDebug \
            --stacktrace \
            --no-daemon \
            2>&1 | tee build.log
          echo "Exit: ${PIPESTATUS[0]}"
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NeurosetVideo-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
